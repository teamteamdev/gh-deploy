[Unit]
Description=GitHub Deploy Tool
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=gh-deploy
Group=gh-deploy
ExecStart=/usr/local/bin/gh-deploy /etc/gh-deploy/config.toml
ExecReload=/bin/kill -HUP $MAINPID
Restart=on-failure
RestartSec=5

[Install]
WantedBy=multi-user.target
