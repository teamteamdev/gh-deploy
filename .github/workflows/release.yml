name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.1'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build and package archives
      run: |
        for arch in amd64 arm64; do
          GOOS=linux GOARCH=$arch go build -ldflags="-w -s" -trimpath -o gh-deploy .
          tar -czf gh-deploy-linux-$arch.tar.gz \
            -C "$PWD" gh-deploy \
            -C "$PWD/systemd" gh-deploy.service
          rm gh-deploy
        done

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          gh-deploy-linux-amd64.tar.gz
          gh-deploy-linux-arm64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
